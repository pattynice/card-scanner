<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Card Scanner</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; padding: 16px; background: #1F4E78; color: white; text-align: center; }
  h1 { font-size: 20px; margin-bottom: 12px; }
  #video { width: 100%; max-width: 480px; border-radius: 8px; border: 3px solid white; background: #000; }
  #startBtn { font-size: 18px; padding: 14px 28px; border-radius: 8px; border: none; background: #FFC000; color: #1F4E78; font-weight: bold; margin-bottom: 16px; }
  #result { margin-top: 16px; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; min-height: 24px; white-space: pre-wrap; text-align: left; }
  .ok { background: #C6EFCE; color: #333; }
  .warn { background: #FFC7CE; color: #333; }
  .idle { background: rgba(255,255,255,0.15); }
  #priceForm { display:none; margin-top: 16px; padding: 16px; background: rgba(255,255,255,0.15); border-radius: 8px; max-width: 480px; margin-left: auto; margin-right: auto; }
  #priceSkuLabel { margin-bottom: 10px; font-weight: bold; }
  #priceInput { font-size: 20px; padding: 10px; width: 70%; border-radius: 6px; border: none; text-align: center; }
  .priceActionBtn { font-size: 16px; padding: 10px 20px; border-radius: 6px; border: none; font-weight: bold; margin: 10px 6px 0; }
  #priceSubmitBtn { background: #C6EFCE; color: #333; }
  #priceCancelBtn { background: #FFC7CE; color: #333; }
  #priceFormMsg { margin-top: 8px; font-size: 13px; }
  #log { margin-top: 16px; font-size: 13px; text-align: left; max-width: 480px; margin-left: auto; margin-right: auto; opacity: 0.85; }
  #log div { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.2); }
</style>
</head>
<body>
  <h1>Scan a card to mark it sold</h1>

  <button id="startBtn">Start Camera</button>
  <video id="video" muted playsinline autoplay style="display:none;"></video>
  <div id="result" class="idle">Tap Start Camera, then allow camera access if asked.</div>

  <div id="priceForm">
    <div id="priceSkuLabel"></div>
    <input id="priceInput" type="number" step="0.01" inputmode="decimal" placeholder="Price sold for ($)">
    <div>
      <button id="priceSubmitBtn" class="priceActionBtn">Submit</button>
      <button id="priceCancelBtn" class="priceActionBtn">Cancel</button>
    </div>
    <div id="priceFormMsg"></div>
  </div>

  <div id="log"></div>

  <script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
  <script>
    // ====================================================================
    // Your Apps Script Web App URL. Get it from your Google Sheet:
    // Card Tracker menu > Show Phone Scanner URL.
    // ====================================================================
    var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxPOFk-E9gEleEobBouC_59C6leyY1e6LrNe_ObkL4MA6O-2f35kHtnYORpsgMsH7RC8w/exec";

    var resultDiv = document.getElementById('result');
    var logDiv = document.getElementById('log');
    var startBtn = document.getElementById('startBtn');
    var video = document.getElementById('video');
    var priceForm = document.getElementById('priceForm');
    var priceSkuLabel = document.getElementById('priceSkuLabel');
    var priceInput = document.getElementById('priceInput');
    var priceSubmitBtn = document.getElementById('priceSubmitBtn');
    var priceCancelBtn = document.getElementById('priceCancelBtn');
    var priceFormMsg = document.getElementById('priceFormMsg');

    var busy = false, lastCode = "", lastTime = 0;
    var codeReader = null;
    var pendingSku = null;

    // Barcodes now encode a full URL (tcgplayer.com/product/ID?sku=SKU) so
    // the same code both opens TCGPlayer for a normal camera scan AND
    // works for this tool. Pull the sku= value back out; if the scanned
    // text isn't one of these URLs, just treat it as a plain SKU (keeps
    // any old-style barcodes working too).
    function extractSku(scannedText) {
      var text = String(scannedText || '').trim();
      var match = text.match(/[?&]sku=([^&]+)/);
      if (match) {
        return decodeURIComponent(match[1]);
      }
      return text;
    }

    startBtn.addEventListener('click', function () {
      if (APPS_SCRIPT_URL.indexOf("PASTE_YOUR") === 0) {
        resultDiv.className = 'warn';
        resultDiv.textContent = "You still need to paste your Apps Script URL into this page's code.";
        return;
      }

      resultDiv.className = 'idle';
      resultDiv.textContent = 'Requesting camera permission...';

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        resultDiv.className = 'warn';
        resultDiv.textContent = 'This browser has no camera API available. Try Safari (iOS) or Chrome (Android).';
        return;
      }

      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(function (stream) {
          stream.getTracks().forEach(function (t) { t.stop(); });
          startBtn.style.display = 'none';
          video.style.display = 'block';
          resultDiv.className = 'ok';
          resultDiv.textContent = 'Camera granted. Starting scanner...';

          if (!codeReader) codeReader = new ZXing.BrowserMultiFormatReader();

          codeReader.decodeFromVideoDevice(null, 'video', function (result, err) {
            if (!result) return;
            var text = result.getText();
            var now = Date.now();
            if (busy || (text === lastCode && now - lastTime < 3000)) return;
            lastCode = text; lastTime = now;
            openPriceForm(extractSku(text));
          }).then(function () {
            resultDiv.textContent = 'Point camera at a barcode...';
          }).catch(function (err2) {
            resultDiv.className = 'warn';
            resultDiv.textContent = 'Scanner failed to start: ' + err2.name + ' - ' + err2.message;
          });
        })
        .catch(function (err) {
          resultDiv.className = 'warn';
          resultDiv.textContent = 'Camera blocked.\nError: ' + err.name + ' - ' + (err.message || '(none)');
        });
    });

    function openPriceForm(sku) {
      busy = true;
      pendingSku = sku;
      priceSkuLabel.textContent = 'Scanned: ' + sku;
      priceInput.value = '';
      priceFormMsg.textContent = '';
      priceForm.style.display = 'block';
      resultDiv.className = 'idle';
      resultDiv.textContent = 'Enter the price you sold it for, then Submit.';
      priceInput.focus();
    }

    priceCancelBtn.addEventListener('click', function () {
      priceForm.style.display = 'none';
      busy = false;
      lastCode = "";
      resultDiv.className = 'idle';
      resultDiv.textContent = 'Point camera at a barcode...';
    });

    priceSubmitBtn.addEventListener('click', function () {
      var price = parseFloat(priceInput.value);
      if (isNaN(price) || price <= 0) {
        priceFormMsg.textContent = 'Enter a valid price greater than 0.';
        return;
      }

      var sku = pendingSku;
      priceForm.style.display = 'none';
      resultDiv.className = 'idle';
      resultDiv.textContent = 'Submitting sale...';

      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ sku: sku, sellPrice: price })
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          resultDiv.textContent = data.message;
          resultDiv.className = data.ok ? 'ok' : 'warn';
          logEntry(data.message);
          busy = false;
        })
        .catch(function () {
          resultDiv.textContent = 'Sent — check your sheet to confirm it updated (could not read back a confirmation message).';
          resultDiv.className = 'warn';
          logEntry('Sent sale for ' + sku + ' at $' + price.toFixed(2) + ' (no confirmation readable)');
          busy = false;
        });
    });

    function logEntry(msg) {
      var entry = document.createElement('div');
      entry.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
      logDiv.prepend(entry);
    }
  </script>
</body>
</html>
