<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Card Scanner</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; padding: 16px; background: #1F4E78; color: white; text-align: center; }
  h1 { font-size: 20px; margin-bottom: 12px; }
  #video { width: 100%; max-width: 480px; border-radius: 8px; border: 3px solid white; background: #000; }
  #startBtn { font-size: 18px; padding: 14px 28px; border-radius: 8px; border: none; background: #FFC000; color: #1F4E78; font-weight: bold; margin-bottom: 16px; }
  #result { margin-top: 16px; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; min-height: 24px; white-space: pre-wrap; text-align: left; }
  .ok { background: #C6EFCE; color: #333; }
  .warn { background: #FFC7CE; color: #333; }
  .idle { background: rgba(255,255,255,0.15); }
  #log { margin-top: 16px; font-size: 13px; text-align: left; max-width: 480px; margin-left: auto; margin-right: auto; opacity: 0.85; }
  #log div { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.2); }
</style>
</head>
<body>
  <h1>Scan a card to mark it sold</h1>

  <button id="startBtn">Start Camera</button>
  <video id="video" muted playsinline autoplay style="display:none;"></video>
  <div id="result" class="idle">Tap Start Camera, then allow camera access if asked.</div>

  <div id="log"></div>

  <script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
  <script>
    // ====================================================================
    // Your Apps Script Web App URL. Get it from your Google Sheet:
    // Card Tracker menu > Show Phone Scanner URL.
    // ====================================================================
    var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw32UHxuql4VXF80E6xroflBBymF1r2fQ6PlQyIsfKKBTXEk2YC0MDt33eZliqOOW79yA/exec";

    var resultDiv = document.getElementById('result');
    var logDiv = document.getElementById('log');
    var startBtn = document.getElementById('startBtn');
    var video = document.getElementById('video');
    var busy = false, lastCode = "", lastTime = 0;
    var codeReader = null;

    startBtn.addEventListener('click', function () {
      resultDiv.className = 'idle';
      resultDiv.textContent = 'Requesting camera permission...';

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        resultDiv.className = 'warn';
        resultDiv.textContent = 'This browser has no camera API available. Try Safari (iOS) or Chrome (Android).';
        return;
      }

      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(function (stream) {
          stream.getTracks().forEach(function (t) { t.stop(); });
          startBtn.style.display = 'none';
          video.style.display = 'block';
          resultDiv.className = 'ok';
          resultDiv.textContent = 'Camera granted. Starting scanner...';

          if (!codeReader) codeReader = new ZXing.BrowserMultiFormatReader();

          codeReader.decodeFromVideoDevice(null, 'video', function (result, err) {
            if (!result) return;
            var text = result.getText();
            var now = Date.now();
            if (busy || (text === lastCode && now - lastTime < 3000)) return;
            lastCode = text; lastTime = now;
            submitScan(text);
          }).then(function () {
            resultDiv.textContent = 'Point camera at a barcode...';
          }).catch(function (err2) {
            resultDiv.className = 'warn';
            resultDiv.textContent = 'Scanner failed to start: ' + err2.name + ' - ' + err2.message;
          });
        })
        .catch(function (err) {
          resultDiv.className = 'warn';
          resultDiv.textContent = 'Camera blocked.\nError: ' + err.name + ' - ' + (err.message || '(none)');
        });
    });

    function submitScan(sku) {
      busy = true;
      resultDiv.className = 'idle';
      resultDiv.textContent = 'Looking up ' + sku + '...';

      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ sku: sku, action: 'sell' })
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          resultDiv.textContent = data.message;
          resultDiv.className = data.ok ? 'ok' : 'warn';
          logEntry(data.message);
          busy = false;
        })
        .catch(function () {
          resultDiv.textContent = 'Sent — check your sheet to confirm it updated (could not read back a confirmation message).';
          resultDiv.className = 'warn';
          logEntry('Sent sell for ' + sku + ' (no confirmation readable)');
          busy = false;
        });
    }

    function logEntry(msg) {
      var entry = document.createElement('div');
      entry.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
      logDiv.prepend(entry);
    }
  </script>
</body>
</html>
